<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理后台 | AI品牌广告图文设计师与知识地图设计师</title>
    <link rel="stylesheet" href="/styles.css?v=5" />
    <style>
      body { background: #0b1020; color: var(--corp-text); }
      .admin-shell { max-width: 1280px; margin: 0 auto; padding: 28px 20px 56px; }
      .admin-head { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; justify-content: space-between; margin-bottom: 22px; padding: 20px; border: 1px solid var(--corp-line); border-radius: 8px; background: linear-gradient(135deg, rgba(79,140,255,.13), rgba(255,255,255,.035)); }
      .admin-head h1 { margin: 0 0 4px; font-size: 28px; }
      .admin-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
      .admin-tabs button { border: 1px solid var(--corp-line); background: rgba(255,255,255,.04); color: var(--corp-muted); padding: 8px 14px; border-radius: 8px; cursor: pointer; }
      .admin-tabs button.active { background: rgba(79,140,255,.22); color: #fff; border-color: rgba(79,140,255,.55); }
      .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
      .stat-card { background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.025)); border: 1px solid var(--corp-line); border-radius: 8px; padding: 16px; }
      .stat-card strong { display: block; font-size: 24px; margin-bottom: 4px; color: #fff; }
      .stat-card span { color: var(--muted); font-size: 13px; }
      .admin-table-wrap { background: rgba(255,255,255,.035); border: 1px solid var(--corp-line); border-radius: 8px; overflow: auto; }
      table.admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
      table.admin-table th, table.admin-table td { padding: 12px 14px; border-bottom: 1px solid var(--corp-line); text-align: left; vertical-align: top; }
      table.admin-table th { background: rgba(255,255,255,.045); font-weight: 700; color: #fff; white-space: nowrap; }
      table.admin-table td { color: var(--corp-text); }
      .thumb-link { display: inline-grid; gap: 6px; color: var(--corp-blue); }
      .thumb-link img { width: 86px; height: 86px; object-fit: cover; border-radius: 8px; border: 1px solid var(--corp-line); background: #111827; }
      .panel-section { display: none; }
      .panel-section.active { display: block; }
      .event { padding: 12px; border: 1px solid var(--corp-line); border-radius: 8px; margin-bottom: 10px; background: rgba(255,255,255,.035); }
      .event time { font-size: 12px; color: var(--muted); }
      .badge-paid { color: #0a7a3f; font-weight: 600; }
      .badge-pending { color: #b45309; font-weight: 600; }
      .badge-fail { color: #b40f1a; font-weight: 600; }
      .badge-halted { color: #fb7185; font-weight: 700; }
      .admin-actions { display: flex; gap: 6px; flex-wrap: wrap; }
      .admin-actions button { font-size: 12px; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--corp-line); background: rgba(255,255,255,.06); color: var(--corp-text); cursor: pointer; }
      .admin-actions button.primary { background: var(--corp-blue); color: #fff; border-color: var(--corp-blue); }
      .admin-actions button.danger { background: rgba(196,30,58,.18); color: #fecdd3; border-color: rgba(196,30,58,.5); }
      .ops-note { margin: 0 0 18px; padding: 12px 14px; border: 1px solid rgba(232,197,71,.22); border-radius: 8px; background: rgba(232,197,71,.08); color: var(--gold-light); font-size: 13px; }
      .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; max-width: 920px; }
      .config-field { display: grid; gap: 8px; }
      .config-field label { color: var(--corp-muted); font-size: 13px; }
      .config-field input { width: 100%; box-sizing: border-box; border: 1px solid var(--corp-line); border-radius: 8px; background: rgba(255,255,255,.055); color: #fff; padding: 10px 12px; }
      .config-actions { margin-top: 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .config-status { color: var(--corp-muted); font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="admin-shell">
      <div class="admin-head">
        <div>
          <h1>管理后台</h1>
          <p class="hint" id="adminHint">加载中…</p>
        </div>
        <div class="admin-tabs" id="adminTabs">
          <button type="button" data-tab="overview" class="active">总览</button>
          <button type="button" data-tab="users">用户</button>
          <button type="button" data-tab="payments">支付</button>
          <button type="button" data-tab="invoices">开票</button>
          <button type="button" data-tab="events">通知</button>
          <button type="button" data-tab="config">AI配置</button>
        </div>
      </div>

      <section class="panel-section active" id="tab-overview">
        <p class="ops-note">默认路径：用户注册即用；支付截图上传后自动通过并开通额度；管理员在“支付”页逐条查看截图，发现异常时立即点击“紧急叫停”。</p>
        <div class="stats-grid" id="statsGrid"></div>
      </section>

      <section class="panel-section" id="tab-users">
        <div class="admin-table-wrap">
          <table class="admin-table" id="usersTable">
            <thead>
              <tr>
                <th>机构</th>
                <th>手机号</th>
                <th>微信</th>
                <th>角色</th>
                <th>剩余额度</th>
                <th>生成任务</th>
                <th>已付订单</th>
                <th>累计付款</th>
                <th>注册时间</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel-section" id="tab-payments">
        <div class="admin-table-wrap">
          <table class="admin-table" id="paymentsTable">
            <thead>
              <tr>
                <th>机构</th>
                <th>套餐</th>
                <th>金额</th>
                <th>额度</th>
                <th>状态</th>
                <th>截图</th>
                <th>手机</th>
                <th>时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel-section" id="tab-invoices">
        <div class="admin-table-wrap">
          <table class="admin-table" id="invoicesTable">
            <thead>
              <tr>
                <th>企业</th>
                <th>税号</th>
                <th>邮箱</th>
                <th>关联订单</th>
                <th>套餐</th>
                <th>订单金额</th>
                <th>开票额</th>
                <th>总额</th>
                <th>状态</th>
                <th>用户机构</th>
                <th>时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel-section" id="tab-events">
        <div id="events"></div>
      </section>

      <section class="panel-section" id="tab-config">
        <p class="ops-note">API Key 只在保存时提交；读取时显示脱敏结果。修改后新生成任务会立即使用新配置。</p>
        <form id="configForm" class="config-form">
          <div class="config-grid">
            <div class="config-field"><label for="baseUrl">Base URL</label><input id="baseUrl" name="base_url" autocomplete="off" placeholder="https://api.fenno.ai/v1" /></div>
            <div class="config-field"><label for="imageModel">Image Model</label><input id="imageModel" name="image_model" autocomplete="off" placeholder="gpt-image-2" /></div>
            <div class="config-field"><label for="apiKey">API Key</label><input id="apiKey" name="api_key" type="password" autocomplete="new-password" placeholder="留空则保持原 key" /></div>
            <div class="config-field"><label for="size">Size</label><input id="size" name="size" autocomplete="off" placeholder="1024x1536" /></div>
            <div class="config-field"><label for="quality">Quality</label><input id="quality" name="quality" autocomplete="off" placeholder="medium" /></div>
            <div class="config-field"><label for="compression">Compression</label><input id="compression" name="output_compression" type="number" min="0" max="100" /></div>
          </div>
          <div class="config-actions admin-actions"><button type="submit" class="primary">保存配置</button><span class="config-status" id="configStatus"></span></div>
        </form>
      </section>
    </div>

    <script type="module">
      const AUTH_URL =
        window.UNIFIED_AUTH_URL ||
        (location.hostname === "localhost" || location.hostname === "127.0.0.1"
          ? "http://127.0.0.1:9080"
          : "https://ai.ms1001.com");
      const hash = new URLSearchParams(location.hash.replace(/^#/, ""));
      const incomingToken = hash.get("access_token");
      if (incomingToken) {
        localStorage.setItem("suat_access_token", incomingToken);
        history.replaceState(null, "", location.pathname + location.search);
      }
      function authHeaders() {
        const token = localStorage.getItem("suat_access_token");
        return token ? { Authorization: `Bearer ${token}` } : {};
      }
      function requireUnifiedAdmin() {
        const token = localStorage.getItem("suat_access_token");
        if (!token && !document.cookie.includes("suat_auth=")) {
          location.href = `${AUTH_URL}/?redirect=${encodeURIComponent(location.href)}`;
        }
      }
      requireUnifiedAdmin();
      const plans = {};
      let dashboard = null;
      let adminConfig = null;

      function esc(text) {
        return String(text ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function fmtTime(ts) {
        return new Date(ts * 1000).toLocaleString();
      }

      function switchTab(name) {
        document.querySelectorAll(".panel-section").forEach((el) => el.classList.remove("active"));
        document.getElementById(`tab-${name}`).classList.add("active");
        document.querySelectorAll("#adminTabs button").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.tab === name);
        });
      }

      document.getElementById("adminTabs").addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-tab]");
        if (btn) switchTab(btn.dataset.tab);
      });

      async function adminPost(path, body = {}) {
        const res = await fetch(path, {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json", ...authHeaders() },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `请求失败 (${res.status})`);
        return data;
      }

      function renderStats() {
        const m = dashboard.metrics || {};
        const pending = (dashboard.payments || []).filter((p) => p.status === "pending").length;
        const halted = (dashboard.payments || []).filter((p) => p.status === "halted").length;
        const items = [
          { label: "注册用户", value: dashboard.user_count || 0 },
          { label: "累计收款", value: `¥${Number(dashboard.payment_total || 0).toFixed(0)}` },
          { label: "待处理支付", value: pending },
          { label: "已叫停", value: halted },
          { label: "生成总数", value: m.total_items || 0 },
          { label: "成功", value: m.completed_count || 0 },
          { label: "失败率", value: `${m.failure_rate_percent || 0}%` },
          { label: "平均耗时", value: m.avg_duration_minutes ? `${m.avg_duration_minutes} 分钟` : "—" },
        ];
        document.getElementById("statsGrid").innerHTML = items
          .map((s) => `<article class="stat-card"><strong>${esc(s.value)}</strong><span>${esc(s.label)}</span></article>`)
          .join("");
      }

      function renderUsers() {
        const tbody = document.querySelector("#usersTable tbody");
        tbody.innerHTML = (dashboard.users || [])
          .map(
            (u) =>
              `<tr>
                <td>${esc(u.org)}</td>
                <td>${esc(u.phone)}</td>
                <td>${esc(u.wechat)}</td>
                <td>${esc(u.role || "user")}</td>
                <td>${esc(u.total_credits ?? u.credits ?? 0)}</td>
                <td>${esc(u.job_count || 0)}</td>
                <td>${esc(u.paid_orders || 0)}</td>
                <td>¥${esc(Number(u.paid_total || 0).toFixed(0))}</td>
                <td>${esc(fmtTime(u.created_at))}</td>
              </tr>`
          )
          .join("");
      }

      function renderPayments() {
        const tbody = document.querySelector("#paymentsTable tbody");
        tbody.innerHTML = (dashboard.payments || [])
          .map((p) => {
            const planName = plans[p.plan_id]?.name || p.plan_id;
            const shot = p.screenshot_file
              ? `<a class="thumb-link" href="/api/admin/payment-screenshot/${esc(p.id)}" target="_blank" rel="noreferrer"><img src="/api/admin/payment-screenshot/${esc(p.id)}" alt="截图" /><span>查看原图</span></a>`
              : "—";
            const statusClass =
              p.status === "approved" ? "badge-paid" : p.status === "pending" ? "badge-pending" : p.status === "halted" ? "badge-halted" : "badge-fail";
            const actions =
              p.status === "pending"
                ? `<div class="admin-actions">
                    <button type="button" class="primary" data-approve="${esc(p.id)}">通过</button>
                    <button type="button" data-reject="${esc(p.id)}">驳回</button>
                  </div>`
                : p.status === "approved"
                  ? `<div class="admin-actions"><button type="button" class="danger" data-halt="${esc(p.id)}">紧急叫停</button></div>`
                  : p.status === "halted"
                    ? "已叫停"
                    : "—";
            return `<tr>
              <td>${esc(p.org)}</td>
              <td>${esc(planName)}</td>
              <td>¥${esc(p.amount)}</td>
              <td>+${esc(p.credits || 0)}</td>
              <td class="${statusClass}">${esc(p.status)}</td>
              <td>${shot}</td>
              <td>${esc(p.phone || p.account_phone)}</td>
              <td>${esc(fmtTime(p.created_at))}</td>
              <td>${actions}</td>
            </tr>`;
          })
          .join("");

        tbody.querySelectorAll("[data-approve]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            try {
              await adminPost(`/api/admin/payments/${btn.dataset.approve}/approve`);
              await load();
            } catch (e) {
              alert(e.message);
            }
          });
        });
        tbody.querySelectorAll("[data-reject]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const reason = prompt("驳回原因（选填）") || "";
            try {
              await adminPost(`/api/admin/payments/${btn.dataset.reject}/reject`, { reason });
              await load();
            } catch (e) {
              alert(e.message);
            }
          });
        });
        tbody.querySelectorAll("[data-halt]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const reason = prompt("叫停原因（建议填写，便于追溯）") || "";
            try {
              await adminPost(`/api/admin/payments/${btn.dataset.halt}/halt`, { reason });
              await load();
            } catch (e) {
              alert(e.message);
            }
          });
        });
      }

      function renderInvoices() {
        const tbody = document.querySelector("#invoicesTable tbody");
        tbody.innerHTML = (dashboard.invoices || [])
          .map((ir) => {
            const actions =
              ir.status === "pending"
                ? `<div class="admin-actions">
                    <button type="button" class="primary" data-invoice-done="${esc(ir.id)}">已开票</button>
                    <button type="button" data-invoice-reject="${esc(ir.id)}">驳回</button>
                  </div>`
                : esc(ir.status);
            return `<tr>
              <td>${esc(ir.company_name)}</td>
              <td>${esc(ir.tax_id)}</td>
              <td>${esc(ir.contact_email)}</td>
              <td>${esc(ir.payment_claim_id ? ir.payment_claim_id.slice(0, 8) + "…" : "—")}</td>
              <td>${esc(ir.order_plan_name || "—")}</td>
              <td>${ir.order_amount != null ? `¥${esc(ir.order_amount)}` : "—"}</td>
              <td>¥${esc(ir.invoice_amount)}</td>
              <td>¥${esc(ir.total_amount)}</td>
              <td>${esc(ir.status)}</td>
              <td>${esc(ir.org)}</td>
              <td>${esc(fmtTime(ir.created_at))}</td>
              <td>${actions}</td>
            </tr>`;
          })
          .join("");

        tbody.querySelectorAll("[data-invoice-done]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            try {
              await adminPost(`/api/admin/invoices/${btn.dataset.invoiceDone}/status`, { status: "processed" });
              await load();
            } catch (e) {
              alert(e.message);
            }
          });
        });
        tbody.querySelectorAll("[data-invoice-reject]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            try {
              await adminPost(`/api/admin/invoices/${btn.dataset.invoiceReject}/status`, { status: "rejected" });
              await load();
            } catch (e) {
              alert(e.message);
            }
          });
        });
      }

      function renderEvents() {
        document.getElementById("events").innerHTML = (dashboard.events || [])
          .map(
            (e) =>
              `<article class="event"><time>${esc(fmtTime(e.created_at))}</time> <strong>${esc(e.event_type)}</strong><p>${esc(e.summary)}</p></article>`
          )
          .join("") || '<p class="hint">暂无通知</p>';
      }

      function renderConfig() {
        if (!adminConfig) return;
        document.getElementById("baseUrl").value = adminConfig.base_url || "";
        document.getElementById("imageModel").value = adminConfig.image_model || "";
        document.getElementById("size").value = adminConfig.size || "";
        document.getElementById("quality").value = adminConfig.quality || "";
        document.getElementById("compression").value = adminConfig.output_compression ?? 80;
        document.getElementById("apiKey").placeholder = adminConfig.has_key ? `已配置：${adminConfig.api_key || "******"}` : "尚未配置";
      }

      document.getElementById("configForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const form = new FormData(e.currentTarget);
        const payload = Object.fromEntries(form.entries());
        if (!payload.api_key) delete payload.api_key;
        if (payload.output_compression !== undefined) payload.output_compression = Number(payload.output_compression);
        const status = document.getElementById("configStatus");
        status.textContent = "保存中...";
        try {
          adminConfig = await adminPost("/api/admin/config", payload);
          document.getElementById("apiKey").value = "";
          renderConfig();
          status.textContent = "已保存";
        } catch (err) {
          status.textContent = err.message;
        }
      });

      async function load() {
        const configRes = await fetch("/api/config", { credentials: "include" });
        const config = await configRes.json();
        Object.assign(plans, config.payment_plans || {});

        const [res, configAdminRes] = await Promise.all([
          fetch("/api/admin/dashboard", { credentials: "include", headers: authHeaders() }),
          fetch("/api/admin/config", { credentials: "include", headers: authHeaders() }),
        ]);
        const data = await res.json();
        if (!res.ok) {
          document.getElementById("adminHint").textContent =
            data.error || "无法加载，请使用管理员账号登录主站后访问 /admin.html";
          return;
        }
        dashboard = data;
        adminConfig = configAdminRes.ok ? await configAdminRes.json() : null;
        const pending = (dashboard.payments || []).filter((p) => p.status === "pending").length;
        const halted = (dashboard.payments || []).filter((p) => p.status === "halted").length;
        document.getElementById("adminHint").textContent = `管理员账号来自 ADMIN_PHONE / ADMIN_PASSWORD · 已加载 ${dashboard.user_count || 0} 位用户 · 待处理 ${pending} 笔 · 已叫停 ${halted} 笔 · 日志 data/admin_alerts.log`;
        renderStats();
        renderUsers();
        renderPayments();
        renderInvoices();
        renderEvents();
        renderConfig();
      }

      load().catch((err) => {
        document.getElementById("adminHint").textContent = err.message;
      });
    </script>
  </body>
</html>
