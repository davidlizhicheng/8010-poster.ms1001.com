# 宝塔完整站点配置 — AI 平面设计系统
# 域名: poster.ms1001.com（可按实际域名修改 server_name 与路径）
# 项目目录: /www/wwwroot/poster.ms1001.com
# Python 后端: 127.0.0.1:8010 (server.py)
#
# 使用方法:
# 1. 宝塔 → 网站 → poster.ms1001.com → 设置 → 配置文件 → 整段替换
# 2. 证书未申请前：删掉 listen 443 与 #SSL-START 到 #SSL-END 整段
# 3. 勿保留宝塔默认 location ~ .*\.(js|css) 规则（会导致无样式）

server
{
    listen 80;
    listen 443 ssl http2;
    server_name poster.ms1001.com;
    index index.html index.htm default.html;
    root /www/wwwroot/poster.ms1001.com;

    #CERT-APPLY-CHECK--START
    # 用于SSL证书申请时的文件验证相关配置 -- 请勿删除
    include /www/server/panel/vhost/nginx/well-known/poster.ms1001.com.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    ssl_certificate    /www/server/panel/vhost/cert/poster.ms1001.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/poster.ms1001.com/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START  错误页配置，可以注释、删除或修改
    error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #REWRITE-START URL重写规则引用,修改后将导致面板设置的伪静态规则失效
    include /www/server/panel/vhost/rewrite/poster.ms1001.com.conf;
    #REWRITE-END

    client_max_body_size 10m;

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location ^~ /outputs/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ^~ /assets/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    # 前端静态资源（须反代 Python，不可由 root 直读 web/）
    location ~ ^/(styles\.css|home\.css|generate\.css|layout\.js|plans\.js|home\.js|generate\.js|pricing-page\.js|modals\.html|index\.html|about\.html|services\.html|pricing\.html|generate\.html|app\.js|auth\.js|admin\.html)$ {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 12h;
        error_log /dev/null;
        access_log /dev/null;
    }

    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location ~ ^/(data|deploy|\.git) {
        return 403;
    }

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    access_log  /www/wwwlogs/poster.ms1001.com.log;
    error_log  /www/wwwlogs/poster.ms1001.com.error.log;
}
